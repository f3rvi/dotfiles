
monitor=,preferred,auto,1

exec-once=hash dbus-update-activation-environment 2>/dev/null/ && dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=$HOME/.config/hypr/autostart

input {
    kb_file=
    kb_layout=us,ru
    kb_variant=
    kb_model=
    kb_options=grp:alt_shift_toggle
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=no
    }

    sensitivity=0
}

general {
    main_mod=SUPER

    gaps_in=8
    gaps_out=15
    border_size=3
    col.active_border=0xff5e81ac
    col.inactive_border=0xff4c566a

    apply_sens_to_raw=0

    damage_tracking=full
}

decoration {
    rounding=7
    blur=0
    blur_size=5
    blur_passes=1
    blur_new_optimizations=1
    drop_shadow=true
    shadow_range=30
    shadow_render_power=1
    col.shadow=0x22000000
    col.shadow_inactive=0x22000000
}

animations {
    enabled=1
    animation=windows,1,6,default
    animation=border,1,10,default
    animation=fade,1,10,default
    animation=workspaces,1,6,default,slide
}

dwindle {
    pseudotile=0
}

gestures {
    workspace_swipe=yes
    workspace_swipe_fingers=4
}

misc {
    no_vfr=false
}

bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

bind=SUPER,RETURN,exec,alacritty
bind=SUPER,Q,killactive,
bind=SUPER,M,exit,
bind=SUPER,S,togglefloating,
bind=SUPER,space,exec,rofi -show drun
bind=SUPER,B,exec,killall -SIGUSR1 waybar
bind=,Print,exec,~/.scripts/screenshot1
bind=SHIFT,Print,exec,~/.scripts/screenshot2
bind=SUPER,P,pseudo,

bind=SUPER,left,movefocus,l
bind=SUPER,right,movefocus,r
bind=SUPER,up,movefocus,u
bind=SUPER,down,movefocus,d

bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5

bind=ALT,1,movetoworkspace,1
bind=ALT,2,movetoworkspace,2
bind=ALT,3,movetoworkspace,3
bind=ALT,4,movetoworkspace,4
bind=ALT,5,movetoworkspace,5

bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1
